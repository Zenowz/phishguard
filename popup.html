<!DOCTYPE html>
<html>
<head>
  <title>PhishGuard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <img src="logo.png" class="logo">

  <div id="authBox">
    <h3>PhishGuard Login</h3>

    <input type="email" id="emailInput" placeholder="Email">
    <input type="password" id="passwordInput" placeholder="Password">

    <button id="loginBtn">Login</button>
    <button id="registerBtn">Register</button>

    <p id="authMessage"></p>
  </div>

  <div id="appBox" style="display:none;">
    <p id="userEmail"></p>
    <button id="logoutBtn">Logout</button>

    <div class="stats-box">
      <h3>User Dashboard</h3>
      <div class="stats-grid">
        <div><strong id="totalScans">0</strong><span>Total</span></div>
        <div><strong id="safeScans">0</strong><span>Safe</span></div>
        <div><strong id="suspiciousScans">0</strong><span>Suspicious</span></div>
        <div><strong id="dangerousScans">0</strong><span>Dangerous</span></div>
      </div>
    </div>

    <input type="text" id="linkInput" placeholder="Paste suspicious link here">

    <button id="scanBtn">Scan Link</button>

    <div id="resultBox">
      <p id="result">Waiting for scan...</p>

      <hr>

      <h3>Cloud Scan History</h3>
      <ul id="historyList">
        <li>No scans yet.</li>
      </ul>

      <button id="clearHistoryBtn">Clear Local Display</button>
    </div>

    <button id="reportBtn">Report Phishing Link</button>
  </div>

</div>

<script src="popup.js"></script>
</body>
</html>
